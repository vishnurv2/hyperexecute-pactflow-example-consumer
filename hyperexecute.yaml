version: 0.1

runson: linux

# Node.js >= 24 required (matches engines field in package.json)
runtime:
  language: node
  version: "24"

globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

autosplit: true
concurrency: 1

retryOnFailure: false
maxRetries: 1

env:
  PACT_BROKER_BASE_URL: https://test.pactflow.io
  PACT_BROKER_TOKEN: O5AIZWxelWbLvqMd8PkAVycBJh2Psyg1
  PACT_PROVIDER: pactflow-example-provider

pre:
  - npm ci
  - npm run type-check
  - npm run check
  # VITE_API_BASE_URL is only a build-time value baked into the JS bundle by Vite.
  # Pact tests never use it — they get a URL from the Pact mock server directly.
  - VITE_API_BASE_URL=http://localhost:8080 npm run build

cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

# Start the Vite dev server in the background before tests run
background:
  - node: VITE_API_BASE_URL=http://localhost:8080 npm run dev
    waitDuration: 10

testDiscovery:
  type: raw
  mode: dynamic
  command: find src -name "*.spec.ts" -o -name "*.test.ts"


scenarioCommandStatusOnly: true

testRunnerCommand: npx vitest run $test

# Reports generated by Vitest (reporters config in vitest.config.ts)
report: true
partialReports:
  - location: reports/junit.xml
    frameworkName: junit
    type: xml
  - location: reports/allure-results
    frameworkName: allure
    type: json

# Pact contract files and test reports saved as job artifacts
uploadArtifacts:
 - name: pact-contracts-and-reports
   path:
    - pacts/
    - reports/

jobLabel: [pact-consumer, vitest, linux, autosplit]
